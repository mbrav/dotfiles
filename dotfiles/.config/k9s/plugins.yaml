# K9s plugins: https://github.com/derailed/k9s/tree/master/plugins
# See https://k9scli.io/topics/plugins/
plugins:
  start-alpine-pod:
    shortCut: Ctrl-T
    confirm: true
    description: "Start an alpine:latest pod in current context/namespace"
    scopes:
      - pods
      - deployments
    command: bash
    background: true
    args:
      - -c
      - |
        echo '{"apiVersion": "apps/v1", "kind": "Deployment", "metadata": {"name": "alpine", "labels": {"app": "alpine", "debug": "1"}}, "spec": {"selector": {"matchLabels": {"app": "alpine"}}, "replicas": 1, "template": {"metadata": {"labels": {"app": "alpine", "debug": "1"}, "annotations": {"kubectl.kubernetes.io/default-container": "alpine"}}, "spec": {"containers": [{"name": "alpine", "image": "alpine:latest", "imagePullPolicy": "Always", "securityContext": {"runAsUser": 0, "runAsGroup": 0}, "stdin": true, "tty": true, "stdinOnce": true, "terminationMessagePath": "/dev/termination-log", "terminationMessagePolicy": "File", "resources": {"requests": {"cpu": "100m", "memory": "100Mi"}, "limits": {"cpu": "100m", "memory": "100Mi"}}}], "restartPolicy": "Always"}}}}' | kubectl apply -f - --context $CONTEXT --namespace $NAMESPACE

  node-root-shell:
    shortCut: a
    description: Run root shell on node
    dangerous: true
    scopes:
      - nodes
    command: bash
    background: false
    confirm: true
    args:
      - -c
      - |
        host="$1"
        json='
        {
          "apiVersion": "v1",
          "spec": {
            "hostIPC": true,
            "hostNetwork": true,
            "hostPID": true
        '
        if ! [[ -z "$host" ]]; then
          json+=",
          \"nodeSelector\" : {
            \"kubernetes.io/hostname\" : \"$host\"
          }
          ";
        fi
        json+='
          }
        }
        '
        kubectl run -ti --image alpine:3.23 --rm --privileged --restart=Never --overrides="$json" root --command -- nsenter -t 1 -m -u -n -i -- bash -l

  secret-openssl-ca:
    shortCut: Ctrl-O
    confirm: false
    description: Openssl ca.crt
    scopes:
      - secrets
    command: bash
    background: false
    args:
      - -c
      - kubectl get secret --context $CONTEXT -n $NAMESPACE $NAME -o
        jsonpath='{.data.ca\.crt}' | base64 -d | openssl storeutl -noout -text
        -certs /dev/stdin |& less

  secret-openssl-tls:
    shortCut: Shift-O
    confirm: false
    description: Openssl tls.crt
    scopes:
      - secrets
    command: bash
    background: false
    args:
      - -c
      - kubectl get secret --context $CONTEXT -n $NAMESPACE $NAME -o
        jsonpath='{.data.tls\.crt}' | base64 -d | openssl storeutl -noout -text
        -certs /dev/stdin |& less

  # remove finalizers from a stuck namespace
  rm-ns:
    shortCut: n
    confirm: true
    dangerous: true
    description: Remove NS Finalizers
    scopes:
      - namespace
    command: sh
    background: false
    args:
      - -c
      - "kubectl get namespace $NAME -o json | jq '.spec.finalizers=[]' |
        kubectl replace --raw /api/v1/namespaces/$NAME/finalize -f - >
        /dev/null"

  # View user-supplied values when the helm chart was created
  helm-values:
    shortCut: v
    confirm: false
    description: Values
    scopes:
      - helm
    command: sh
    background: false
    args:
      - -c
      - "helm get values $COL-NAME -n $NAMESPACE --kube-context $CONTEXT | less
        -K"

  # View default helm chart values
  helm-default-values:
    shortCut: Shift-V
    confirm: false
    description: Chart Default Values
    scopes:
      - helm
    command: sh
    background: false
    args:
      - -c
      - >-
        revision=$(helm history -n $NAMESPACE --kube-context $CONTEXT $COL-NAME
        | grep deployed | cut -d$'\t' -f1 | tr -d ' \t'); kubectl get secrets
        --context $CONTEXT -n $NAMESPACE sh.helm.release.v1.$COL-NAME.v$revision
        -o yaml | yq e '.data.release' - | base64 -d | base64 -d | gunzip | jq
        -r '.chart.values' | yq -P | less -K

  # Requires helm-diff plugin installed: https://github.com/databus23/helm-diff
  # In helm view: <Shift-D> Diff with Previous Revision
  # In helm-history view: <Shift-Q> Diff with Current Revision
  helm-diff-previous:
    shortCut: Shift-D
    confirm: false
    description: Diff with Previous Revision
    scopes:
      - helm
    command: bash
    background: false
    args:
      - -c
      - >-
        LAST_REVISION=$(($COL-REVISION-1)); helm diff revision $COL-NAME
        $COL-REVISION $LAST_REVISION --kube-context $CONTEXT --namespace
        $NAMESPACE --color | less -RK
  helm-diff-current:
    shortCut: Shift-Q
    confirm: false
    description: Diff with Current Revision
    scopes:
      - history
    command: bash
    background: false
    args:
      - -c
      - >-
        RELEASE_NAME=$(echo $NAME | cut -d':' -f1); LATEST_REVISION=$(helm
        history -n $NAMESPACE --kube-context $CONTEXT $RELEASE_NAME | grep
        deployed | cut -d$'\t' -f1 | tr -d ' \t'); helm diff revision
        $RELEASE_NAME $LATEST_REVISION $COL-REVISION --kube-context $CONTEXT
        --namespace $NAMESPACE --color | less -RK

  # Issues a helm delete --purge for the resource associated with the selected pod
  # Requires https://github.com/derailed/k9s/blob/master/plugins/kubectl/kubectl-purge
  helm-purge:
    shortCut: Ctrl-P
    description: Helm Purge
    dangerous: true
    scopes:
      - po
    command: kubectl
    background: true
    args:
      - purge
      - $NAMESPACE
      - $NAME

  # Sends logs over to jq for processing. This leverages kubectl plugin kubectl-jq.
  jqlogs:
    shortCut: Ctrl-J
    confirm: false
    description: "Logs (jq)"
    scopes:
      - po
    command: kubectl
    background: false
    args:
      - jq
      - $NAME
      - $NAMESPACE
      - $CONTEXT

  argocd:
    shortCut: "s"
    description: Sync ArgoCD Application
    scopes:
      - application
    command: argocd
    args:
      - app
      - sync
      - $NAME
      - --app-namespace
      - $NAMESPACE
    background: true
    confirm: true

  refresh-apps:
    shortCut: Shift-R
    confirm: false
    scopes:
      - apps
    description: Refresh a argocd app hard
    command: bash
    background: false
    args:
      - -c
      - "kubectl annotate applications -n argocd $NAME
        argocd.argoproj.io/refresh=hard"

  disable-auto-sync:
    shortCut: Shift-J
    confirm: false
    scopes:
      - apps
    description: Disable argocd sync
    command: kubectl
    background: false
    args:
      - patch
      - applications
      - -n
      - argocd
      - $NAME
      - "--type=json"
      - '-p=[{"op":"replace", "path": "/spec/syncPolicy", "value": {}}]'

  enable-auto-sync:
    shortCut: Shift-B
    confirm: false
    scopes:
      - apps
    description: Enable argocd sync
    command: kubectl
    background: false
    args:
      - patch
      - applications
      - -n
      - argocd
      - $NAME
      - --type=merge
      - '-p={"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true},"syncOptions":["ApplyOutOfSyncOnly=true","CreateNamespace=true","PruneLast=true","PrunePropagationPolicy=foreground"]}}}'

  dive:
    shortCut: d
    confirm: false
    description: "Dive image"
    scopes:
      - containers
    command: dive
    background: false
    args:
      - $COL-IMAGE

  # --- Create debug container for selected pod in current namespace
  # See https://kubernetes.io/docs/tasks/debug/debug-application/debug-running-pod/#ephemeral-container
  debug:
    shortCut: Shift-D
    description: Add debug container
    dangerous: true
    scopes:
      - containers
    command: bash
    background: false
    confirm: true
    inputs:
      - name: image
        label: Debug image
        type: dropdown
        required: true
        default: nicolaka/netshoot:v0.15
        options:
          - nicolaka/netshoot:v0.15
          - busybox:1.37
          - alpine:3.23
          - ubuntu:26.04
      - name: profile
        label: Debug profile
        type: dropdown
        required: true
        default: sysadmin
        options:
          - general
          - baseline
          - restricted
          - netadmin
          - sysadmin
          - legacy
      - name: share_processes
        label: Share processes
        type: bool
        required: true
        default: true
    args:
      - -c
      - >-
        kubectl debug -it --context $CONTEXT -n=$NAMESPACE $POD --target=$NAME
        --image=$INPUT_IMAGE --profile=$INPUT_PROFILE $([
        "$INPUT_SHARE_PROCESSES" = "true" ] && echo "--share-processes") -- sh
