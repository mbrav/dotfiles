version: "2"

# Options for analysis running.
run:
  # The default concurrency value is the number of available CPU.
  concurrency: 4
  # Timeout for analysis, e.g. 30s, 5m.
  # Default: 1m
  timeout: 5m
  # Exit code when at least one issue was found.
  # Default: 1
  issues-exit-code: 2
  # Include test files or not.
  # Default: true
  tests: true
  # List of build tags, all linters use it.
  # Default: [].
  modules-download-mode: readonly
  # Allow multiple parallel golangci-lint instances running.
  # If false (default) - golangci-lint acquires file lock on start.
  allow-parallel-runners: false
  # Define the Go version limit.
  # Mainly related to generics support in go1.18.
  # Default: use Go version from the go.mod file, fallback on the env var `GOVERSION`, fallback on 1.17
  go: "1.26"

# output configuration options
output:
  # Add a prefix to the output file references.
  # Default is no prefix.
  path-prefix: ""
  # Format: colored-line-number|line-number|json|tab|checkstyle|code-climate|junit-xml|github-actions
  #
  # Multiple can be specified by separating them by comma, output can be provided
  # for each of them by separating format name and path by colon symbol.
  # Output path can be either `stdout`, `stderr` or path to the file to write to.
  # Example: "checkstyle:report.json,colored-line-number"
  #
  # Default: colored-line-number
  formats:
    text:
      # Print lines of code with issue.
      # Default: true
      print-issued-lines: true
      # Print linter name in the end of issue text.
      # Default: true
      print-linter-name: true
      path: stdout
    # tab:
    #   print-linter-name: true
    #   path: stdout
  sort-order:
    - linter
    - severity
    - file # filepath, line, and column.

linters:
  default: all
  enable:
    - wsl_v5
    - gomodguard_v2
  disable:
    # --- Style preferences (kept) ---
    - mnd # magic numbers are allowed
    - goconst # repeated string literals are fine
    - funlen # 60-line cap is too strict for two cohesive command handlers
    - lll # the only long line is an unsplittable JSON test fixture
    - wsl # superseded by wsl_v5
    - gomodguard # superseded by gomodguard_v2

    # --- Opinionated; fight idiomatic Go for this CLI ---
    - varnamelen # short names in short scopes are idiomatic (i, p, st, fs, ...)
    - noinlineerr # `if err := f(); err != nil` is standard, recommended Go
    - nonamedreturns # named returns document tmuxResult's (string, string, int)
    - nlreturn # blank-line-before-return is already handled by wsl_v5
    - forbidigo # this IS a CLI: writing results to stdout via fmt.Print* is the point
    - exhaustruct # partial struct literals (intentional zero-value fields) are fine
    - gochecknoglobals # choice tables, process cfg, and test-injection vars are deliberate
    - godox # the single TODO is a real, intentional future-work note

    # --- Not applicable to this project ---
    - noctx # synchronous local tmux/git calls; --wait loops own the timeouts, not subprocesses
    - gosec # local dev tool: drives tmux/git by design (G204), writes user-readable state
    - paralleltest # several tests use t.Setenv, which is incompatible with t.Parallel()
    - tagliatelle # JSON tags are a FROZEN snake_case on-disk schema (Python + agents.sh compat)

  # TODOs
  # - dupl # FIXME: duplicated code
  # - err113 # FIXME: use errors.Is / errors.As properly
  # - wrapcheck # FIXME: wrap all returned errors
