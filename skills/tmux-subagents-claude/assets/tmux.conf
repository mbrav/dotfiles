# Minimal tmux config for the tmux-subagents-claude skill.
#
# Drop into ~/.tmux.conf (or source from your existing config). The skill needs
# only the REQUIRED block below; the rest is optional convenience.
#
# Full example with theme + plugins lives in the dotfiles repo:
#   dotfiles/.config/tmux/tmux.conf

# ─── REQUIRED ───────────────────────────────────────────────────────────────
# Skill keys off window NAME (not id) and assumes names are stable. Without
# these, tmux will rename windows automatically and the `agents:<window>`
# mirror lookup breaks (no sessions / pane not found errors).
set -g automatic-rename off
set -g allow-rename off

# ─── RECOMMENDED ────────────────────────────────────────────────────────────
# Longer scrollback so `capture <task> full` returns useful history.
set -g history-limit 100000

# Mouse + extended keys make pane navigation and capture-copy practical.
set -g mouse on
set -g extended-keys on
set -ga extended-keys-format csi-u

# Snappier Escape (Claude TUI uses Escape to exit modal state — keep this low
# so the `prompt` reset sequence doesn't have to wait).
set-option -sg escape-time 10

# ─── OPTIONAL: Prefix+a → agents session ────────────────────────────────────
# Jumps from current window straight to the mirrored `agents:<window>` pane
# group. Requires the helper script from the dotfiles repo:
#   ~/.config/tmux/tmux-named-session.sh
#
# bind a display-popup -E -w 95% -h 85% -d '#{pane_current_path}' \
#   "~/.config/tmux/tmux-named-session.sh agents"

# ─── OPTIONAL: agent-count status segment (Dracula theme) ───────────────────
# Shows "🤖 3|1|2" — pane counts per agents-session window. Script in dotfiles:
#   ~/.config/tmux/agents.sh
#
# set -g @dracula-plugins "custom:../../../agents.sh"
# set -g @dracula-agents-label "🤖"
